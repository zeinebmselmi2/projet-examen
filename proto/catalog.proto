syntax = "proto3";

package catalog;

service CatalogService {
  rpc CreateResource (CreateResourceRequest) returns (ResourceResponse);
  rpc GetResource (GetResourceRequest) returns (ResourceResponse);
  rpc ListResources (ListResourcesRequest) returns (ListResourcesResponse);
  rpc UpdateResource (UpdateResourceRequest) returns (ResourceResponse);
  rpc DeleteResource (DeleteResourceRequest) returns (DeleteResourceResponse);
  rpc SearchResources (SearchResourcesRequest) returns (ListResourcesResponse);
  rpc UpdateAvailability (UpdateAvailabilityRequest) returns (ResourceResponse);
}

message Resource {
  string id = 1;
  string name = 2;
  string description = 3;
  string category = 4;
  double price_per_day = 5;
  int32 availability = 6;
  string location = 7;
  string created_at = 8;
}

message CreateResourceRequest {
  string name = 1;
  string description = 2;
  string category = 3;
  double price_per_day = 4;
  int32 availability = 5;
  string location = 6;
}

message GetResourceRequest {
  string id = 1;
}

message ListResourcesRequest {
  int32 page = 1;
  int32 limit = 2;
  string category = 3;
}

message ListResourcesResponse {
  repeated Resource resources = 1;
  int32 total = 2;
}

message UpdateResourceRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  string category = 4;
  double price_per_day = 5;
  int32 availability = 6;
  string location = 7;
}

message DeleteResourceRequest {
  string id = 1;
}

message DeleteResourceResponse {
  bool success = 1;
  string message = 2;
}

message SearchResourcesRequest {
  string query = 1;
  string category = 2;
}

message UpdateAvailabilityRequest {
  string id = 1;
  int32 delta = 2;
}

message ResourceResponse {
  Resource resource = 1;
}
